# .github/workflows/ci.yml
name: CI/CD Pipeline for Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'  # Каждый день в 6 утра
  workflow_dispatch:  # Ручной запуск

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Run all tests
      run: npm run test:all
      continue-on-error: true
    
    - name: Generate Allure Report
      run: npm run allure:generate
    
    - name: Load Allure History
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages
    
    - name: Build Allure Report with History
      uses: simple-elf/allure-report-action@v1.7
      if: always()
      with:
        gh_pages: gh-pages
        allure_history: allure-history
        allure_results: allure-results
    
    - name: Deploy Allure Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
    
    - name: Upload test results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          allure-results/
          test-results/
          playwright-report/
    
    - name: Send Telegram Notification
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
           Тесты завершены!
          
          Репозиторий: ${{ github.repository }}
          Ветка: ${{ github.ref_name }}
          Статус: ${{ job.status }}
          
           Отчет: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-history/
          
           GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Build Docker image
      run: docker build -t diplom-automation:${{ github.sha }} .
    
    - name: Tag Docker image
      run: docker tag diplom-automation:${{ github.sha }} diplom-automation:latest
    
    - name: Save Docker image
      run: docker save diplom-automation:latest -o diplom-automation.tar
    
    - name: Upload Docker image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: diplom-automation.tar